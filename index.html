<script type="module">
import { prepareWithSegments, layoutNextLine } from 'https://esm.sh/@chenglou/pretext@0.0.3'

const canvas = document.getElementById('c')
const ctx = canvas.getContext('2d')
const overlay = document.getElementById('overlay')
const statsEl = document.getElementById('stats')
const modeEl = document.getElementById('mode-indicator')

// ═══════════════ STATE ═══════════════
let W, H, dpr
let time = 0
let paused = false
let audioMode = null
let sensitivity = 1.0
let fps = 60
let frameCount = 0
let lastFpsTime = performance.now()

// Mouse
let mouseX = -1000, mouseY = -1000
let targetMouseX = -1000, targetMouseY = -1000
let mouseSpeed = 0
let prevMX = -1000, prevMY = -1000
let lensRadius = 200
let mouseActive = false

// Audio
let audioCtx = null
let analyser = null
let freqData = null
let timeData = null
let source = null
let micStream = null

// Frequency bands
let bass = 0, mid = 0, high = 0, overall = 0
let smoothBass = 0, smoothMid = 0, smoothHigh = 0
let prevBass = 0
let beatDetected = false
let beatCooldown = 0
let beatCount = 0
let beatRings = []

// Ripples from clicks
let ripples = []

// Word highlight
let highlightGroup = -1
let highlightDecay = 0

// Cymatics mode
let cymaticsMode = false
let mouseIdleTime = 0
let lastMouseMoveTime = performance.now()

// Energy buildup tracking
let energyHistory = []
let buildupIntensity = 0
let volume = 0.35 // master volume
let dropEffect = 0 // flash when buildup drops suddenly

// Stars
let stars = []

// ═══════════════ TEXT ═══════════════
const paragraphs = [
  "소리가 문자를 깨운다. 주파수가 글자를 흔들고, 비트가 단어를 폭발시킨다.",
  "Sound is vibration. Vibration is movement. Movement is life. Every letter breathes.",
  "138억 년 전 빅뱅의 메아리가 아직도 우주를 채운다. 우주 배경 복사, 3K의 잔향.",
  "Every atom in your body was once inside a star. You are the universe experiencing itself.",
  "말은 공기의 조각이다. 숨을 내쉬면 의미가 된다. 글자는 그 의미의 화석이다.",
  "Frequencies below 20Hz you feel in your chest. Bass is not heard — it is experienced.",
  "공명: 같은 주파수를 가진 두 물체가 서로를 깨우는 현상. 목소리가 글자를 깨운다.",
  "The harmonic series is nature's music theory. Overtones stack like fractals of sound.",
  "시간은 진동이다. 세슘-133 원자의 진동 9,192,631,770번이 1초를 정의한다.",
  "Cymatics: sound makes matter dance. Sand on a vibrating plate reveals hidden geometry.",
  "A440. 모든 오케스트라가 맞추는 기준점. 하나의 주파수가 세계를 동기화한다.",
  "Resonance breaks bridges. Resonance shatters glass. Resonance moves these letters.",
  "파동은 매질 없이도 전파된다. 빛은 진공을 가른다. 중력파는 시공을 주무른다.",
  "Your heartbeat is the first rhythm you ever heard. 60-100 BPM. The tempo of being.",
  "음파는 공기를 압축하고 팽창시킨다. 이 글자들도 마찬가지다. 압축, 팽창, 공명.",
  "White noise contains every frequency simultaneously. Chaos hiding infinite order.",
]
const fullText = paragraphs.join(' ✦ ')

// ═══════════════ CHARS ═══════════════
let chars = []
const fontSize = 17
const lineHeight = 28
const font = fontSize + 'px Inter, Pretendard, system-ui, sans-serif'
const padding = 36

function resize() {
  dpr = window.devicePixelRatio || 1
  W = window.innerWidth
  H = window.innerHeight
  canvas.width = W * dpr
  canvas.height = H * dpr
  ctx.scale(dpr, dpr)
  initStars()
  buildLines()
}

function initStars() {
  stars = []
  for (let i = 0; i < 150; i++) {
    stars.push({
      x: Math.random() * W,
      y: Math.random() * H,
      size: 0.2 + Math.random() * 1.2,
      twinkleSpeed: 0.5 + Math.random() * 2.5,
      twinkleOffset: Math.random() * Math.PI * 2,
      hue: 180 + Math.random() * 180,
    })
  }
}

function buildLines() {
  chars = []
  currentWordGroup = 0
  lastCharWasStar = false
  ctx.font = font

  try {
    const prepared = prepareWithSegments(fullText, font)
    let cursor = { segmentIndex: 0, graphemeIndex: 0 }
    let y = padding + 16
    let idx = 0

    while (y < H - padding - 55) {
      const maxW = W - padding * 2
      const line = layoutNextLine(prepared, cursor, maxW)
      if (line === null) {
        cursor = { segmentIndex: 0, graphemeIndex: 0 }
        const line2 = layoutNextLine(prepared, cursor, maxW)
        if (line2 === null) break
        idx = pushLineChars(line2.text, padding, y, idx)
        cursor = line2.end
      } else {
        idx = pushLineChars(line.text, padding, y, idx)
        cursor = line.end
      }
      y += lineHeight
    }
  } catch(e) {
    let y = padding + 16
    let tIdx = 0
    let idx = 0
    while (y < H - padding - 55 && tIdx < fullText.length * 3) {
      let x = padding
      const maxW = W - padding * 2
      while (x < padding + maxW && tIdx < fullText.length * 3) {
        const ch = fullText[tIdx % fullText.length]
        const w = ctx.measureText(ch).width
        if (x + w > padding + maxW) break
        pushChar(ch, x, y, idx++)
        x += w
        tIdx++
      }
      y += lineHeight
    }
  }
}

function pushLineChars(text, startX, y, idx) {
  let x = startX
  ctx.font = font
  for (const ch of [...text]) {
    const w = ctx.measureText(ch).width
    pushChar(ch, x, y, idx++)
    x += w
  }
  return idx
}

// Track which "word group" each char belongs to (split by ✦)
let currentWordGroup = 0
let lastCharWasStar = false

function pushChar(ch, x, y, index) {
  const nRow = y / H
  const nCol = x / W
  if (ch === '✦') {
    currentWordGroup++
    lastCharWasStar = true
  } else {
    lastCharWasStar = false
  }
  chars.push({
    char: ch, baseX: x, baseY: y, x, y,
    vx: 0, vy: 0,
    rotation: 0, scale: 1, opacity: 0.5,
    index: index,
    wordGroup: currentWordGroup,
    freqBand: nRow < 0.35 ? 'bass' : nRow < 0.68 ? 'mid' : 'high',
    phase: (nCol + nRow * 0.7) * Math.PI * 4,
    hue: 220, sat: 30, light: 60,
    trail: [],
    highlight: 0, // beat highlight intensity
  })
}

// ═══════════════ AUDIO ═══════════════
async function initAudio(mode) {
  audioMode = mode
  audioCtx = new (window.AudioContext || window.webkitAudioContext)()
  analyser = audioCtx.createAnalyser()
  analyser.fftSize = 2048
  analyser.smoothingTimeConstant = 0.82

  freqData = new Uint8Array(analyser.frequencyBinCount)
  timeData = new Uint8Array(analyser.frequencyBinCount)

  if (mode === 'mic') {
    try {
      micStream = await navigator.mediaDevices.getUserMedia({ audio: true })
      source = audioCtx.createMediaStreamSource(micStream)
      // Mic gain normalization — boost quiet mics
      const micGain = audioCtx.createGain()
      micGain.gain.value = 2.5
      const compressor = audioCtx.createDynamicsCompressor()
      compressor.threshold.value = -30
      compressor.knee.value = 20
      compressor.ratio.value = 4
      compressor.attack.value = 0.003
      compressor.release.value = 0.15
      source.connect(micGain)
      micGain.connect(compressor)
      compressor.connect(analyser)
      musicNodes.push(micGain, compressor)
      modeEl.textContent = '🎤 MIC'
    } catch(e) {
      await startDemoMusic()
    }
  } else {
    await startDemoMusic()
  }
  overlay.classList.add('hidden')
}

let musicNodes = []
let musicIntervals = []

function startDemoMusic() {
  if (!audioCtx) return
  audioMode = 'music'
  modeEl.textContent = '🎵 SYNTH'

  const master = audioCtx.createGain()
  master.gain.value = 0.35

  // Reverb via convolver (simple impulse)
  const convolver = audioCtx.createConvolver()
  const reverbLen = audioCtx.sampleRate * 2
  const impulse = audioCtx.createBuffer(2, reverbLen, audioCtx.sampleRate)
  for (let ch = 0; ch < 2; ch++) {
    const data = impulse.getChannelData(ch)
    for (let i = 0; i < reverbLen; i++) {
      data[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / reverbLen, 2.5)
    }
  }
  convolver.buffer = impulse

  const reverbGain = audioCtx.createGain()
  reverbGain.gain.value = 0.15

  const dryGain = audioCtx.createGain()
  dryGain.gain.value = 0.85

  master.connect(dryGain)
  master.connect(convolver)
  convolver.connect(reverbGain)
  dryGain.connect(analyser)
  reverbGain.connect(analyser)
  analyser.connect(audioCtx.destination)

  musicNodes.push(master, convolver, reverbGain, dryGain)

  // === Sub bass drone ===
  const subOsc = audioCtx.createOscillator()
  const subGain = audioCtx.createGain()
  subOsc.type = 'sine'
  subOsc.frequency.value = 55
  subGain.gain.value = 0.2
  subOsc.connect(subGain)
  subGain.connect(master)
  subOsc.start()
  musicNodes.push(subOsc, subGain)

  // Sub LFO
  const subLfo = audioCtx.createOscillator()
  const subLfoGain = audioCtx.createGain()
  subLfo.type = 'sine'
  subLfo.frequency.value = 0.12
  subLfoGain.gain.value = 10
  subLfo.connect(subLfoGain)
  subLfoGain.connect(subOsc.frequency)
  subLfo.start()
  musicNodes.push(subLfo, subLfoGain)

  // === Warm pad with chord progression ===
  const chordProg = [
    [220, 277.18, 329.63],   // Am
    [196, 246.94, 329.63],   // Em/G
    [174.61, 220, 261.63],   // F
    [196, 246.94, 293.66],   // G
  ]
  let chordIdx = 0
  const padGain = audioCtx.createGain()
  const padFilter = audioCtx.createBiquadFilter()
  padGain.gain.value = 0.04
  padFilter.type = 'lowpass'
  padFilter.frequency.value = 600
  padFilter.Q.value = 1.5
  padFilter.connect(padGain)
  padGain.connect(master)
  musicNodes.push(padGain, padFilter)

  let padOscs = []
  function setChord(freqs) {
    // Fade out old oscillators
    for (const o of padOscs) {
      try { o.stop(audioCtx.currentTime + 0.5) } catch(e) {}
    }
    padOscs = []
    for (const freq of freqs) {
      const o1 = audioCtx.createOscillator()
      const o2 = audioCtx.createOscillator()
      o1.type = 'sawtooth'
      o2.type = 'sawtooth'
      o1.frequency.value = freq
      o2.frequency.value = freq * 1.005
      o1.connect(padFilter)
      o2.connect(padFilter)
      o1.start()
      o2.start()
      padOscs.push(o1, o2)
      musicNodes.push(o1, o2)
    }
  }
  setChord(chordProg[0])

  // Change chord every 4 bars (4 seconds)
  const chordInterval = setInterval(() => {
    if (paused || !audioCtx) return
    chordIdx = (chordIdx + 1) % chordProg.length
    setChord(chordProg[chordIdx])
    // Update sub bass root
    const roots = [55, 49, 43.65, 49]
    subOsc.frequency.setTargetAtTime(roots[chordIdx], audioCtx.currentTime, 0.3)
  }, 4000)
  musicIntervals.push(chordInterval)

  // Pad filter sweep
  const padLfo = audioCtx.createOscillator()
  const padLfoGain = audioCtx.createGain()
  padLfo.type = 'sine'
  padLfo.frequency.value = 0.06
  padLfoGain.gain.value = 500
  padLfo.connect(padLfoGain)
  padLfoGain.connect(padFilter.frequency)
  padLfo.start()
  musicNodes.push(padLfo, padLfoGain)

  // === Arpeggio (follows chord) ===
  let arpIdx = 0
  const arpInterval = setInterval(() => {
    if (paused || !audioCtx) return
    const chord = chordProg[chordIdx]
    // Build arpeggio from current chord + octave
    const arpNotes = [...chord, ...chord.map(f => f * 2)]
    const freq = arpNotes[arpIdx % arpNotes.length]
    arpIdx++

    const osc = audioCtx.createOscillator()
    const env = audioCtx.createGain()
    const flt = audioCtx.createBiquadFilter()
    osc.type = arpIdx % 3 === 0 ? 'triangle' : 'sine'
    osc.frequency.value = freq
    flt.type = 'lowpass'
    flt.frequency.value = 1500 + Math.sin(time * 0.5) * 800

    const now = audioCtx.currentTime
    env.gain.setValueAtTime(0, now)
    env.gain.linearRampToValueAtTime(0.06 + Math.random() * 0.03, now + 0.03)
    env.gain.exponentialRampToValueAtTime(0.001, now + 0.6 + Math.random() * 0.8)

    osc.connect(flt)
    flt.connect(env)
    env.connect(master)
    osc.start(now)
    osc.stop(now + 2)
  }, 280)
  musicIntervals.push(arpInterval)

  // === Kick ===
  let kickStep = 0
  const kickInterval = setInterval(() => {
    if (paused || !audioCtx) return
    kickStep++
    if (kickStep % 4 !== 0 && Math.random() > 0.25) return

    const now = audioCtx.currentTime
    const kOsc = audioCtx.createOscillator()
    const kGain = audioCtx.createGain()
    kOsc.type = 'sine'
    kOsc.frequency.setValueAtTime(160, now)
    kOsc.frequency.exponentialRampToValueAtTime(28, now + 0.12)
    kGain.gain.setValueAtTime(0.45, now)
    kGain.gain.exponentialRampToValueAtTime(0.001, now + 0.25)
    kOsc.connect(kGain)
    kGain.connect(master)
    kOsc.start(now)
    kOsc.stop(now + 0.35)
  }, 250)
  musicIntervals.push(kickInterval)

  // === Hi-hat ===
  const hatInterval = setInterval(() => {
    if (paused || !audioCtx) return
    if (Math.random() > 0.6) return

    const now = audioCtx.currentTime
    const bufSize = audioCtx.sampleRate * 0.04
    const noiseBuf = audioCtx.createBuffer(1, bufSize, audioCtx.sampleRate)
    const d = noiseBuf.getChannelData(0)
    for (let i = 0; i < bufSize; i++) d[i] = Math.random() * 2 - 1

    const noise = audioCtx.createBufferSource()
    noise.buffer = noiseBuf
    const hpf = audioCtx.createBiquadFilter()
    hpf.type = 'highpass'
    hpf.frequency.value = 7000
    const hatGain = audioCtx.createGain()
    hatGain.gain.setValueAtTime(0.06, now)
    hatGain.gain.exponentialRampToValueAtTime(0.001, now + 0.05)

    noise.connect(hpf)
    hpf.connect(hatGain)
    hatGain.connect(master)
    noise.start(now)
    noise.stop(now + 0.06)
  }, 125)
  musicIntervals.push(hatInterval)

  musicNodes.push({ stop: () => musicIntervals.forEach(i => clearInterval(i)) })
}

function stopMusic() {
  for (const node of musicNodes) {
    try { if (node.stop) node.stop() } catch(e) {}
    try { if (node.disconnect) node.disconnect() } catch(e) {}
  }
  musicNodes = []
  musicIntervals.forEach(i => clearInterval(i))
  musicIntervals = []
  if (micStream) {
    micStream.getTracks().forEach(t => t.stop())
    micStream = null
  }
}

// ═══════════════ ANALYSIS ═══════════════
function analyzeAudio() {
  if (!analyser || !freqData) {
    bass = mid = high = overall = 0
    return
  }

  analyser.getByteFrequencyData(freqData)
  analyser.getByteTimeDomainData(timeData)

  const binCount = freqData.length
  const bassEnd = Math.floor(binCount * 0.025)
  const midEnd = Math.floor(binCount * 0.2)

  let bassSum = 0, midSum = 0, highSum = 0
  for (let i = 0; i < binCount; i++) {
    const v = freqData[i] / 255
    if (i < bassEnd) bassSum += v
    else if (i < midEnd) midSum += v
    else highSum += v
  }

  bass = (bassSum / Math.max(bassEnd, 1)) * sensitivity
  mid = (midSum / Math.max(midEnd - bassEnd, 1)) * sensitivity
  high = (highSum / Math.max(binCount - midEnd, 1)) * sensitivity
  overall = bass * 0.45 + mid * 0.35 + high * 0.2

  // Smooth values
  smoothBass += (bass - smoothBass) * 0.3
  smoothMid += (mid - smoothMid) * 0.3
  smoothHigh += (high - smoothHigh) * 0.3

  // Beat detection
  if (beatCooldown > 0) beatCooldown--
  if (bass > prevBass * 1.35 + 0.12 && bass > 0.25 && beatCooldown <= 0) {
    beatDetected = true
    beatCooldown = 8
    beatCount++
    // Create beat ring
    createBeatRing()
    // Highlight a random word group
    const maxGroup = currentWordGroup || paragraphs.length
    highlightGroup = Math.floor(Math.random() * maxGroup)
    highlightDecay = 1.0
  } else {
    beatDetected = false
  }
  prevBass = bass

  // Energy buildup detection
  energyHistory.push(overall)
  if (energyHistory.length > 60) energyHistory.shift()
  if (energyHistory.length >= 30) {
    const recent = energyHistory.slice(-15).reduce((a, b) => a + b, 0) / 15
    const earlier = energyHistory.slice(0, 15).reduce((a, b) => a + b, 0) / 15
    const delta = recent - earlier
    if (delta > 0.05) {
      buildupIntensity = Math.min(1, buildupIntensity + delta * 2)
    } else {
      // Drop detection: was building, now falling
      if (buildupIntensity > 0.3 && delta < -0.02) {
        dropEffect = buildupIntensity
      }
      buildupIntensity *= 0.95
    }
    dropEffect *= 0.92
  }
}

function createBeatRing() {
  const el = document.createElement('div')
  el.className = 'beat-ring'
  el.style.left = (W / 2) + 'px'
  el.style.top = (H / 2) + 'px'
  const hue = Math.floor(Math.random() * 360)
  el.style.borderColor = 'hsla(' + hue + ', 70%, 60%, 0.6)'
  document.body.appendChild(el)
  setTimeout(() => el.remove(), 900)
}

function createClickRipple(x, y) {
  const el = document.createElement('div')
  el.className = 'click-ripple'
  el.style.left = x + 'px'
  el.style.top = y + 'px'
  el.style.background = 'radial-gradient(circle, rgba(255,200,100,0.3) 0%, transparent 70%)'
  document.body.appendChild(el)
  ripples.push({ x, y, time: time, strength: 1 })
  setTimeout(() => el.remove(), 700)
}

// ═══════════════ PHYSICS ═══════════════
function updatePhysics() {
  if (paused) return
  analyzeAudio()

  // Mouse interpolation
  const mdx = targetMouseX - prevMX
  const mdy = targetMouseY - prevMY
  mouseSpeed = Math.sqrt(mdx * mdx + mdy * mdy)
  prevMX = targetMouseX
  prevMY = targetMouseY

  // Auto-center lens when mouse idle for 3s
  mouseIdleTime = performance.now() - lastMouseMoveTime
  if (mouseIdleTime > 3000 && !mouseActive) {
    targetMouseX += (W / 2 - targetMouseX) * 0.02
    targetMouseY += (H / 2 - targetMouseY) * 0.02
  }

  mouseX += (targetMouseX - mouseX) * 0.12
  mouseY += (targetMouseY - mouseY) * 0.12

  // Decay ripples
  ripples = ripples.filter(r => time - r.time < 1.5)

  const friction = 0.87
  const returnForce = 0.07

  for (const p of chars) {
    let bandValue = 0, bandHue = 220

    if (p.freqBand === 'bass') {
      bandValue = smoothBass
      bandHue = 350 + smoothBass * 50
    } else if (p.freqBand === 'mid') {
      bandValue = smoothMid
      bandHue = 140 + smoothMid * 60
    } else {
      bandValue = smoothHigh
      bandHue = 230 + smoothHigh * 70
    }

    // === Cymatics mode: chars form geometric patterns from audio ===
    if (cymaticsMode) {
      const cx = W / 2
      const cy = H / 2
      // Position on a circle/pattern based on char index and audio
      const totalChars = chars.length || 1
      const angle = (p.index / totalChars) * Math.PI * 2 * (3 + Math.floor(overall * 4))
      const radius = 80 + (p.index / totalChars) * Math.min(W, H) * 0.35
      const audioMod = 1 + bandValue * 0.5
      const targetCX = cx + Math.cos(angle + time * 0.3) * radius * audioMod
      const targetCY = cy + Math.sin(angle + time * 0.3) * radius * audioMod

      p.vx += (targetCX - p.x) * 0.04
      p.vy += (targetCY - p.y) * 0.04
    }

    // === Idle breathing (always alive even without audio) ===
    const idleAmp = 1.5 * (1 - Math.min(overall * 3, 1)) // fades as audio increases
    const idleWave = Math.sin(p.phase * 0.3 + time * 0.8) * idleAmp
    const idleHWave = Math.cos(p.phase * 0.2 + time * 0.5) * idleAmp * 0.4

    // === Sound waves ===
    const waveAmp = bandValue * 22 * sensitivity
    const waveSpeed = 2.5 + overall * 5

    const wave = Math.sin(p.phase + time * waveSpeed) * waveAmp + idleWave
    p.vy += (p.baseY + wave - p.y) * 0.14 - p.vy * 0.08

    const hWave = Math.cos(p.phase * 0.6 + time * waveSpeed * 0.5) * waveAmp * 0.25 + idleHWave
    p.vx += (p.baseX + hWave - p.x) * 0.11 - p.vx * 0.08

    // === Mouse lens effect ===
    if (mouseActive) {
      const dx = p.x - mouseX
      const dy = p.y - mouseY
      const dist = Math.sqrt(dx * dx + dy * dy)
      const lensR = lensRadius + overall * 80

      if (dist < lensR && dist > 1) {
        const falloff = 1 - dist / lensR
        // Amplify audio response near cursor
        const amplify = falloff * falloff * 2.5
        const audioForce = bandValue * amplify * 15

        // Radial displacement synced to audio
        const angle = Math.atan2(dy, dx)
        const pulse = Math.sin(time * waveSpeed * 1.5 + dist * 0.02) * audioForce
        p.vx += Math.cos(angle) * pulse * 0.5
        p.vy += Math.sin(angle) * pulse * 0.5

        // Color boost near cursor
        bandHue += falloff * 40
        bandValue = Math.min(1, bandValue + falloff * 0.3)
      }
    }

    // === Click ripple effect ===
    for (const r of ripples) {
      const rdx = p.x - r.x
      const rdy = p.y - r.y
      const rdist = Math.sqrt(rdx * rdx + rdy * rdy)
      const age = time - r.time
      const rippleRadius = age * 400
      const rippleWidth = 60
      const distToRing = Math.abs(rdist - rippleRadius)

      if (distToRing < rippleWidth && rdist > 1) {
        const ringFalloff = 1 - distToRing / rippleWidth
        const timeFalloff = Math.max(0, 1 - age / 1.5)
        const force = ringFalloff * timeFalloff * 8 * r.strength
        const rAngle = Math.atan2(rdy, rdx)
        p.vx += Math.cos(rAngle) * force
        p.vy += Math.sin(rAngle) * force
      }
    }

    // === Beat impulse ===
    if (beatDetected) {
      const angle = p.phase + time * 0.5
      const impulse = 5 * bass
      p.vx += Math.cos(angle) * impulse * (Math.random() - 0.2)
      p.vy += Math.sin(angle) * impulse * (Math.random() - 0.2)
    }

    // Spring return
    p.vx += (p.baseX - p.x) * returnForce * 0.35
    p.vy += (p.baseY - p.y) * returnForce * 0.35

    // Integrate
    p.vx *= friction
    p.vy *= friction
    p.x += p.vx
    p.y += p.vy

    // Word highlight
    const isHighlighted = (p.wordGroup === highlightGroup && highlightDecay > 0.05)
    if (isHighlighted) {
      p.highlight = highlightDecay
    } else {
      p.highlight *= 0.9
    }

    // Visual
    const speed = Math.sqrt(p.vx * p.vx + p.vy * p.vy)
    p.rotation = Math.atan2(p.vy, p.vx) * Math.min(speed / 10, 0.25)
    p.scale = 1 + bandValue * 0.4 + (beatDetected ? bass * 0.25 : 0) + p.highlight * 0.3 + buildupIntensity * 0.15
    // Idle breathing opacity so text is readable without audio
    const idleOpacity = 0.5 + Math.sin(p.phase * 0.15 + time * 0.6) * 0.05
    p.opacity = idleOpacity + bandValue * 0.4 + overall * 0.15 + p.highlight * 0.35
    p.hue = bandHue + p.highlight * 40
    p.sat = 35 + bandValue * 55 + p.highlight * 20
    p.light = 50 + bandValue * 30 + p.highlight * 20

    // Trails
    if (speed > 1.8 && chars.length < 1800) {
      p.trail.push({ x: p.x, y: p.y, opacity: 0.2 + bandValue * 0.15 })
      if (p.trail.length > 4) p.trail.shift()
    } else {
      for (const t of p.trail) t.opacity *= 0.78
      p.trail = p.trail.filter(t => t.opacity > 0.02)
    }
  }

  // Decay highlight
  highlightDecay *= 0.96
}

// ═══════════════ RENDER ═══════════════
function render() {
  ctx.clearRect(0, 0, W, H)

  // Background base + aurora
  ctx.fillStyle = '#03030a'
  ctx.fillRect(0, 0, W, H)
  const buGlow = buildupIntensity * 8
  for (let ai = 0; ai < 3; ai++) {
    const aPhase = time * 0.06 + ai * 2.1
    const ax = W * (0.3 + 0.4 * Math.sin(aPhase * 0.7 + ai))
    const ay = H * (0.25 + 0.35 * Math.cos(aPhase * 0.5 + ai * 1.3))
    const ar = Math.min(W, H) * (0.2 + overall * 0.12 + buildupIntensity * 0.08)
    const aGrad = ctx.createRadialGradient(ax, ay, 0, ax, ay, ar)
    const aHues = [280 + smoothBass * 40, 180 + smoothMid * 30, 340 + smoothHigh * 30]
    const aAlpha = 0.012 + overall * 0.01 + buildupIntensity * 0.006
    aGrad.addColorStop(0, 'hsla(' + aHues[ai] + ', 55%, 28%, ' + aAlpha + ')')
    aGrad.addColorStop(0.6, 'hsla(' + (aHues[ai] + 30) + ', 35%, 18%, ' + (aAlpha * 0.3) + ')')
    aGrad.addColorStop(1, 'transparent')
    ctx.fillStyle = aGrad
    ctx.fillRect(0, 0, W, H)
  }
  const bgGrad = ctx.createRadialGradient(W/2, H/2, 0, W/2, H/2, Math.max(W, H) * 0.5)
  const bgR = Math.floor(smoothBass * 15 + buGlow)
  const bgG = Math.floor(6 + smoothMid * 4 + buGlow * 0.5)
  const bgB = Math.floor(8 + smoothHigh * 14 + buGlow)
  bgGrad.addColorStop(0, 'rgb(' + bgR + ',' + bgG + ',' + bgB + ')')
  bgGrad.addColorStop(1, '#03030a')
  ctx.fillStyle = bgGrad
  ctx.fillRect(0, 0, W, H)

  // Stars
  for (const s of stars) {
    const twinkle = 0.3 + 0.7 * (0.5 + 0.5 * Math.sin(time * s.twinkleSpeed + s.twinkleOffset))
    const boost = 1 + overall * 1.5
    ctx.beginPath()
    ctx.arc(s.x, s.y, s.size * boost, 0, Math.PI * 2)
    ctx.fillStyle = 'hsla(' + (s.hue + overall * 50) + ', 50%, 80%, ' + (twinkle * (0.15 + overall * 0.25)) + ')'
    ctx.fill()
  }

  // Circular spectrum visualizer (center, behind text) — mirrored
  if (freqData && overall > 0.01) {
    const cx = W / 2
    const cy = H / 2
    const baseR = Math.min(W, H) * 0.08
    const maxR = Math.min(W, H) * 0.32
    const binCount = 64
    const step = Math.PI * 2 / (binCount * 2) // mirrored

    // Outer ring (mirrored spectrum)
    ctx.beginPath()
    for (let i = 0; i < binCount * 2; i++) {
      const idx = i < binCount ? i : binCount * 2 - 1 - i
      const v = freqData[idx * 2] / 255
      const r = baseR + v * (maxR - baseR) * (1 + overall * 0.3)
      const angle = i * step - Math.PI / 2
      const px = cx + Math.cos(angle) * r
      const py = cy + Math.sin(angle) * r
      if (i === 0) ctx.moveTo(px, py)
      else ctx.lineTo(px, py)
    }
    ctx.closePath()
    ctx.strokeStyle = 'rgba(255, 255, 255, ' + (0.04 + overall * 0.06) + ')'
    ctx.lineWidth = 1.2
    ctx.stroke()

    // Inner ring
    ctx.beginPath()
    for (let i = 0; i < binCount * 2; i++) {
      const idx = i < binCount ? i : binCount * 2 - 1 - i
      const v = freqData[idx * 2] / 255
      const r = baseR * 0.6 + v * baseR * 0.8
      const angle = i * step - Math.PI / 2 + time * 0.1
      const px = cx + Math.cos(angle) * r
      const py = cy + Math.sin(angle) * r
      if (i === 0) ctx.moveTo(px, py)
      else ctx.lineTo(px, py)
    }
    ctx.closePath()
    ctx.strokeStyle = 'rgba(255, 255, 255, ' + (0.02 + overall * 0.03) + ')'
    ctx.lineWidth = 0.6
    ctx.stroke()

    // Fill with gradient
    const specGrad = ctx.createRadialGradient(cx, cy, baseR * 0.3, cx, cy, maxR)
    specGrad.addColorStop(0, 'rgba(' + Math.floor(smoothBass * 60) + ', ' + Math.floor(smoothMid * 30) + ', ' + Math.floor(smoothHigh * 60) + ', 0.03)')
    specGrad.addColorStop(1, 'transparent')
    ctx.fillStyle = specGrad
    ctx.fill()
  }

  // Waveform (subtle, horizontal center line)
  if (timeData && overall > 0.02) {
    ctx.beginPath()
    ctx.strokeStyle = 'rgba(255, 255, 255, ' + (0.03 + overall * 0.04) + ')'
    ctx.lineWidth = 0.8
    const sliceW = W / timeData.length
    for (let i = 0; i < timeData.length; i++) {
      const v = timeData[i] / 128.0
      const wY = H / 2 + (v - 1) * H * 0.1 * sensitivity
      if (i === 0) ctx.moveTo(0, wY)
      else ctx.lineTo(i * sliceW, wY)
    }
    ctx.stroke()
  }

  // Beat flash
  if (beatDetected) {
    ctx.fillStyle = 'rgba(255, 255, 255, ' + (bass * 0.04) + ')'
    ctx.fillRect(0, 0, W, H)
  }

  // Drop effect — expanding flash when buildup releases
  if (dropEffect > 0.05) {
    ctx.fillStyle = 'rgba(255, 255, 255, ' + (dropEffect * 0.08) + ')'
    ctx.fillRect(0, 0, W, H)
    ctx.beginPath()
    ctx.arc(W/2, H/2, dropEffect * Math.max(W, H) * 0.4, 0, Math.PI * 2)
    ctx.strokeStyle = 'rgba(255, 220, 150, ' + (dropEffect * 0.15) + ')'
    ctx.lineWidth = 2 + dropEffect * 3
    ctx.stroke()
  }

  // Aurora sweep — subtle color bands that shift with audio
  if (overall > 0.05) {
    const auroraHue = (time * 20 + beatCount * 30) % 360
    const auroraGrad = ctx.createLinearGradient(0, 0, W, H)
    auroraGrad.addColorStop(0, 'hsla(' + auroraHue + ', 60%, 30%, ' + (overall * 0.02) + ')')
    auroraGrad.addColorStop(0.5, 'hsla(' + ((auroraHue + 120) % 360) + ', 50%, 25%, ' + (overall * 0.015) + ')')
    auroraGrad.addColorStop(1, 'hsla(' + ((auroraHue + 240) % 360) + ', 60%, 30%, ' + (overall * 0.02) + ')')
    ctx.fillStyle = auroraGrad
    ctx.fillRect(0, 0, W, H)
  }

  // Frequency band zone lines
  if (overall > 0.05) {
    ctx.setLineDash([3, 10])
    ctx.lineWidth = 0.5

    ctx.beginPath()
    ctx.moveTo(padding, H * 0.35)
    ctx.lineTo(W - padding, H * 0.35)
    ctx.strokeStyle = 'rgba(255, 80, 80, ' + (smoothBass * 0.06) + ')'
    ctx.stroke()

    ctx.beginPath()
    ctx.moveTo(padding, H * 0.68)
    ctx.lineTo(W - padding, H * 0.68)
    ctx.strokeStyle = 'rgba(80, 255, 150, ' + (smoothMid * 0.05) + ')'
    ctx.stroke()

    ctx.setLineDash([])
  }

  // Constellation lines between energetic nearby chars
  if (chars.length < 1500 && overall > 0.1) {
    const active = []
    for (let i = 0; i < chars.length; i++) {
      const c = chars[i]
      if (c.vx * c.vx + c.vy * c.vy > 5) active.push(c)
    }
    if (active.length > 1 && active.length < 250) {
      ctx.lineWidth = 0.4
      const thresh = 30 + overall * 15
      const t2 = thresh * thresh
      for (let i = 0; i < active.length; i++) {
        const a = active[i]
        for (let j = i + 1; j < active.length; j++) {
          const b = active[j]
          const dx = a.x - b.x
          const dy = a.y - b.y
          const d2 = dx * dx + dy * dy
          if (d2 < t2) {
            const alpha = (1 - Math.sqrt(d2) / thresh) * 0.12
            ctx.beginPath()
            ctx.moveTo(a.x, a.y)
            ctx.lineTo(b.x, b.y)
            ctx.strokeStyle = 'hsla(' + ((a.hue + b.hue) / 2) + ', 60%, 65%, ' + alpha + ')'
            ctx.stroke()
          }
        }
      }
    }
  }

  // Trails
  ctx.font = font
  ctx.textBaseline = 'top'
  for (const p of chars) {
    for (const t of p.trail) {
      ctx.globalAlpha = t.opacity * 0.25
      ctx.fillStyle = 'hsla(' + p.hue + ', ' + p.sat + '%, ' + p.light + '%, 1)'
      ctx.fillText(p.char, t.x, t.y)
    }
  }
  ctx.globalAlpha = 1

  // Characters with selective glow
  for (const p of chars) {
    ctx.save()
    ctx.translate(p.x, p.y)
    ctx.rotate(p.rotation)
    ctx.scale(p.scale, p.scale)

    // Glow for highlighted / high-energy chars (perf guarded)
    const energy = p.highlight + (p.opacity > 0.8 ? (p.opacity - 0.8) * 2 : 0)
    if (energy > 0.15 && chars.length < 1500) {
      ctx.shadowColor = 'hsla(' + p.hue + ', 80%, 70%, ' + Math.min(energy * 0.5, 0.6) + ')'
      ctx.shadowBlur = 6 + energy * 10
    }

    ctx.fillStyle = 'hsla(' + p.hue + ', ' + Math.min(p.sat, 90) + '%, ' + Math.min(p.light, 85) + '%, ' + p.opacity + ')'
    ctx.fillText(p.char, 0, 0)
    ctx.shadowBlur = 0
    ctx.restore()
  }

  // Mouse cursor visualization
  if (mouseActive) {
    const cursorPulse = 3 + Math.sin(time * 3) * 0.5 + overall * 2
    const lensR = lensRadius + overall * 80

    // Outer lens ring
    ctx.beginPath()
    ctx.arc(mouseX, mouseY, lensR, 0, Math.PI * 2)
    ctx.strokeStyle = 'rgba(255, 200, 150, ' + (0.03 + overall * 0.04) + ')'
    ctx.lineWidth = 0.5
    ctx.stroke()

    // Concentric audio rings
    for (let r = 1; r <= 3; r++) {
      const ringR = lensR * (r / 4)
      const ringPulse = Math.sin(time * 2.5 + r * 1.2) * 0.5 + 0.5
      ctx.beginPath()
      ctx.arc(mouseX, mouseY, ringR + ringPulse * overall * 10, 0, Math.PI * 2)
      ctx.strokeStyle = 'rgba(255, 200, 150, ' + (0.015 + overall * 0.02) + ')'
      ctx.lineWidth = 0.4
      ctx.stroke()
    }

    // Center dot
    ctx.beginPath()
    ctx.arc(mouseX, mouseY, cursorPulse, 0, Math.PI * 2)
    const cursorHue = 30 + overall * 200
    ctx.fillStyle = 'hsla(' + cursorHue + ', 70%, 70%, 0.7)'
    ctx.fill()

    // Orbital particles synced to audio
    for (let i = 0; i < 6; i++) {
      const a = time * (0.3 + overall * 0.5) + (i / 6) * Math.PI * 2
      const orbR = 20 + smoothBass * 30 + Math.sin(time * 1.5 + i * 1.5) * 8
      const px = mouseX + Math.cos(a) * orbR
      const py = mouseY + Math.sin(a) * orbR
      const size = 0.8 + overall * 1.5
      ctx.beginPath()
      ctx.arc(px, py, size, 0, Math.PI * 2)
      ctx.fillStyle = 'hsla(' + (cursorHue + i * 30) + ', 60%, 70%, ' + (0.15 + overall * 0.2) + ')'
      ctx.fill()
    }
  }

  // Bottom spectrum bar
  if (freqData && overall > 0.01) {
    const barW = Math.min(W * 0.85, 700)
    const barH = 30
    const barX = (W - barW) / 2
    const barY = H - 70
    const bins = Math.min(freqData.length, 128)
    const binW = barW / bins

    for (let i = 0; i < bins; i++) {
      const v = freqData[i] / 255
      const h = v * barH
      const hue = (i / bins) * 300
      ctx.fillStyle = 'hsla(' + hue + ', 65%, ' + (45 + v * 35) + '%, ' + (0.2 + v * 0.5) + ')'
      ctx.fillRect(barX + i * binW, barY + barH - h, binW - 0.3, h)
    }
  }

  // Band labels
  if (overall > 0.1) {
    ctx.font = '9px monospace'
    ctx.fillStyle = 'rgba(255, 100, 100, ' + (smoothBass * 0.25) + ')'
    ctx.fillText('BASS ' + (smoothBass * 100).toFixed(0) + '%', padding, H * 0.35 - 6)
    ctx.fillStyle = 'rgba(100, 255, 150, ' + (smoothMid * 0.2) + ')'
    ctx.fillText('MID ' + (smoothMid * 100).toFixed(0) + '%', padding, H * 0.68 - 6)
    ctx.fillStyle = 'rgba(130, 130, 255, ' + (smoothHigh * 0.2) + ')'
    ctx.fillText('HIGH ' + (smoothHigh * 100).toFixed(0) + '%', padding, H - padding - 50)
    ctx.font = font
  }

  time += 0.016

  // FPS
  frameCount++
  const now = performance.now()
  if (now - lastFpsTime > 500) {
    fps = Math.round(frameCount / ((now - lastFpsTime) / 1000))
    frameCount = 0
    lastFpsTime = now
    statsEl.innerHTML = chars.length + ' chars · ' + fps + ' fps<br>beats: ' + beatCount + ' · sens: ' + sensitivity.toFixed(1) + 'x · vol: ' + Math.round(volume * 100) + '%' + (buildupIntensity > 0.1 ? '<br>▲ buildup ' + Math.round(buildupIntensity * 100) + '%' : '') + (cymaticsMode ? '<br>⬡ CYMATICS' : '')
  }
}

// ═══════════════ LOOP ═══════════════
function loop() {
  updatePhysics()
  render()
  requestAnimationFrame(loop)
}

// ═══════════════ EVENTS ═══════════════
document.getElementById('btn-mic').addEventListener('click', () => initAudio('mic'))
document.getElementById('btn-music').addEventListener('click', () => initAudio('music'))

window.addEventListener('mousemove', e => {
  targetMouseX = e.clientX
  targetMouseY = e.clientY
  mouseActive = true
  lastMouseMoveTime = performance.now()
})

window.addEventListener('click', e => {
  if (!overlay.classList.contains('hidden')) return
  createClickRipple(e.clientX, e.clientY)

  // Click-triggered sound burst
  if (audioCtx && audioMode === 'music') {
    const now = audioCtx.currentTime
    const burst = audioCtx.createOscillator()
    const env = audioCtx.createGain()
    burst.type = 'sine'
    burst.frequency.setValueAtTime(300 + Math.random() * 400, now)
    burst.frequency.exponentialRampToValueAtTime(80, now + 0.3)
    env.gain.setValueAtTime(0.15, now)
    env.gain.exponentialRampToValueAtTime(0.001, now + 0.3)
    burst.connect(env)
    env.connect(analyser)
    burst.start(now)
    burst.stop(now + 0.4)
  }
})

window.addEventListener('wheel', e => {
  lensRadius = Math.max(80, Math.min(500, lensRadius + e.deltaY * 0.3))
}, { passive: true })

window.addEventListener('keydown', e => {
  if (e.key === ' ') {
    e.preventDefault()
    paused = !paused
    if (paused && audioCtx) audioCtx.suspend()
    if (!paused && audioCtx) audioCtx.resume()
  }
  if (e.key === 'm' || e.key === 'M') {
    stopMusic()
    initAudio(audioMode === 'mic' ? 'music' : 'mic')
  }
  if (e.key === 'r' || e.key === 'R') {
    for (const p of chars) {
      p.x = p.baseX; p.y = p.baseY
      p.vx = 0; p.vy = 0
      p.rotation = 0; p.scale = 1; p.trail = []
    }
    beatCount = 0
    ripples = []
  }
  if (e.key === 'ArrowRight') sensitivity = Math.min(3.0, sensitivity + 0.1)
  if (e.key === 'ArrowLeft') sensitivity = Math.max(0.2, sensitivity - 0.1)
  if (e.key === '1') sensitivity = 0.5
  if (e.key === '2') sensitivity = 1.0
  if (e.key === '3') sensitivity = 2.0
  if (e.key === 'c' || e.key === 'C') {
    cymaticsMode = !cymaticsMode
  }
  // Volume: + / - keys
  if (e.key === '=' || e.key === '+') {
    volume = Math.min(1.0, volume + 0.05)
    if (musicNodes.length > 0 && musicNodes[0].gain) {
      musicNodes[0].gain.setTargetAtTime(volume, audioCtx.currentTime, 0.05)
    }
  }
  if (e.key === '-' || e.key === '_') {
    volume = Math.max(0, volume - 0.05)
    if (musicNodes.length > 0 && musicNodes[0].gain) {
      musicNodes[0].gain.setTargetAtTime(volume, audioCtx.currentTime, 0.05)
    }
  }
})

window.addEventListener('resize', resize)

// Touch
let lastTap = 0
window.addEventListener('touchstart', e => {
  if (!overlay.classList.contains('hidden')) return
  targetMouseX = e.touches[0].clientX
  targetMouseY = e.touches[0].clientY
  mouseActive = true

  const now = Date.now()
  if (now - lastTap < 300) {
    paused = !paused
    if (paused && audioCtx) audioCtx.suspend()
    if (!paused && audioCtx) audioCtx.resume()
  } else {
    createClickRipple(targetMouseX, targetMouseY)
  }
  lastTap = now
})

let initialPinchDist = null
window.addEventListener('touchmove', e => {
  e.preventDefault()
  if (e.touches.length === 1) {
    targetMouseX = e.touches[0].clientX
    targetMouseY = e.touches[0].clientY
  }
  if (e.touches.length === 2) {
    const dx = e.touches[0].clientX - e.touches[1].clientX
    const dy = e.touches[0].clientY - e.touches[1].clientY
    const dist = Math.sqrt(dx * dx + dy * dy)
    if (initialPinchDist !== null) {
      const scale = dist / initialPinchDist
      lensRadius = Math.max(80, Math.min(500, lensRadius * scale))
    }
    initialPinchDist = dist
    // Center between fingers
    targetMouseX = (e.touches[0].clientX + e.touches[1].clientX) / 2
    targetMouseY = (e.touches[0].clientY + e.touches[1].clientY) / 2
  }
}, { passive: false })

window.addEventListener('touchend', () => { initialPinchDist = null })

// ═══════════════ INIT ═══════════════
let pretextLoaded = false
try {
  const testP = prepareWithSegments('test', font)
  const testL = layoutNextLine(testP, { segmentIndex: 0, graphemeIndex: 0 }, 200)
  if (testL && testL.text) pretextLoaded = true
} catch(e) { pretextLoaded = false }

resize()
loop()

const statusEl = document.createElement('div')
statusEl.style.cssText = 'position:fixed;bottom:44px;left:16px;font:10px monospace;z-index:20;opacity:0.2;'
statusEl.textContent = pretextLoaded ? '✓ pretext' : '⚠ fallback'
statusEl.style.color = pretextLoaded ? 'rgba(100,255,150,0.5)' : 'rgba(255,150,100,0.5)'
document.body.appendChild(statusEl)
</script>
</body>
</html>
